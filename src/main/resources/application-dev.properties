# 개발 환경 설정

# 서버 설정
server.port=8080
server.servlet.context-path=/

# H2 데이터베이스 설정
spring.datasource.url=jdbc:h2:file:./data/afbscenter;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA 설정
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# SQL 로그는 콘솔·디스크 부하가 큼. 쿼리 확인 시에만 true 권장
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# H2 콘솔 활성화
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 로깅 설정 (DEBUG는 요청마다 로그 폭주 → 로컬 체감 속도 저하)
logging.level.com.afbscenter=INFO
logging.level.org.springframework.web=INFO
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# 인코딩 설정
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# CORS 설정 (개발 환경)
cors.allowed-origins=http://localhost:8080,http://localhost:3000,https://jasper-declared-josue.ngrok-free.dev

# 정적 리소스 캐싱 비활성화 (개발 환경)
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
