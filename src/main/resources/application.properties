# 서버 설정
server.port=8080
server.servlet.context-path=/
# 응답 gzip (JSON·HTML·JS·CSS 전송량 감소, 체감 로딩 개선)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/xml
server.compression.min-response-size=2048

# 활성 프로파일 (기본값: dev)
spring.profiles.active=dev

# H2 데이터베이스 설정 (UTF-8 인코딩 명시)
spring.datasource.url=jdbc:h2:file:./data/afbscenter;MODE=MySQL;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA 설정 (UTF-8 인코딩 보장)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true
# N+1 완화: lazy 로드 시 ID별 개별 조회 대신 배치로 조회 (bookings where id=? 반복 방지)
spring.jpa.properties.hibernate.default_batch_fetch_size=100
# Booking ID 단건 로드 추적 (N+1 원인 파악용). 로그: BOOKING_LOAD_TRACE, [BOOKING_LOAD]
spring.jpa.properties.hibernate.integrator_provider=com.afbscenter.config.BookingLoadTraceIntegratorProvider

# H2 콘솔 활성화 (개발용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 로깅 설정 (UTF-8 인코딩)
logging.level.com.afbscenter=DEBUG
# Booking ID 단건 로드 추적 (N+1 원인 파악). WARN으로 [BOOKING_LOAD] 출력
logging.level.BOOKING_LOAD_TRACE=WARN
logging.level.org.springframework.web=INFO
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# 인코딩 설정
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# CORS 설정
cors.allowed-origins=http://localhost:8080,https://jasper-declared-josue.ngrok-free.dev

# JWT 설정 (프로덕션에서는 환경변수 JWT_SECRET 사용 권장)
jwt.secret=${JWT_SECRET:AFBS-Center-Secret-Key-For-JWT-Token-Generation-2024-Change-In-Production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# 관리자 계정 초기화 비밀번호 (프로덕션에서는 환경변수 ADMIN_INIT_PASSWORD 사용 권장)
admin.init.password=${ADMIN_INIT_PASSWORD:07-503392a!!}

# Settings 기본값 (DB에 값이 없을 때 사용)
settings.default.center-name=AFBS 야구센터
settings.default.phone=02-1234-5678
settings.default.address=서울특별시 강남구
settings.default.open-time=09:00
settings.default.close-time=22:00
settings.default.holiday-info=연중무휴
settings.default.session-duration=60
settings.default.max-advance-booking-days=30
settings.default.cancellation-deadline-hours=24
settings.default.tax-rate=10.0
settings.default.refund-policy=예약 24시간 전까지 전액 환불
settings.default.sms-enabled=true
settings.default.email-enabled=false
settings.default.reminder-hours=24

# 상품/이용권 기본값 (DB·요청에 없을 때 사용)
product.default.total-count=10
product.default.usage-count=10

# 결제 기본값 (자동 생성 결제에 사용)
payment.default.method=CASH
payment.default.status=COMPLETED
payment.default.category=PRODUCT_SALE

# --- 운영·세무·매출 집계 기준 (코드: AccountingPolicy, PaymentRepository.sumAmountByDateRange, /api/payments/summary) ---
# - 대시보드 기간 매출: 각 결제 건 (결제금액 - 환불금액) 합계, 상태는 COMPLETED 또는 미설정만 (전액 환불 REFUNDED 건은 제외).
# - 부분 환불: 동일 결제 행의 refund_amount에 반영 → 순매출이 자동 반영.
# - 이용권 소프트 삭제: payments 행은 삭제하지 않음 → 과거 매출·엑셀 증빙은 유지. 장부상 "매출 인식 시점"은 세무사와 별도 합의.
# - 현금영수증·부가세·카드 매입: 본 앱은 금액·수단만 관리. 세금계산서/현금영수증 발행은 외부 정책과 맞출 것.

# 시설 초기화 데이터 (DatabaseMigration에서 사용)
facility.init.saha.name=사하점
facility.init.saha.location=부산
facility.init.saha.open-time=08:00
facility.init.saha.close-time=00:00
facility.init.saha.hourly-rate=0

facility.init.yeonsan.name=연산점
facility.init.yeonsan.location=부산
facility.init.yeonsan.open-time=08:00
facility.init.yeonsan.close-time=00:00
facility.init.yeonsan.hourly-rate=0
